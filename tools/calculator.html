<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .calculator {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            width: 100%;
            max-width: 350px;
        }

        .display {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 1rem;
            text-align: right;
            margin-bottom: 1rem;
            min-height: 80px;
        }

        .display-input {
            font-size: 2rem;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }

        .display-result {
            font-size: 1rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .btn {
            padding: 1.25rem;
            font-size: 1.25rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: #f0f0f0;
            color: #333;
        }

        .btn-operator {
            background: #667eea;
            color: white;
        }

        .btn-equals {
            background: #764ba2;
            color: white;
            grid-column: span 2;
        }

        .btn-clear {
            background: #ef4444;
            color: white;
        }

        .btn-backspace {
            background: #f59e0b;
            color: white;
        }

        .history {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-title {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .history-item {
            font-size: 0.875rem;
            color: #999;
            padding: 0.25rem 0;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-input" id="display">0</div>
            <div class="display-result" id="result"></div>
        </div>
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearAll()">C</button>
            <button class="btn btn-backspace" onclick="backspace()">⌫</button>
            <button class="btn btn-operator" onclick="appendValue('%')">%</button>
            <button class="btn btn-operator" onclick="appendValue('/')">÷</button>

            <button class="btn btn-number" onclick="appendValue('7')">7</button>
            <button class="btn btn-number" onclick="appendValue('8')">8</button>
            <button class="btn btn-number" onclick="appendValue('9')">9</button>
            <button class="btn btn-operator" onclick="appendValue('*')">×</button>

            <button class="btn btn-number" onclick="appendValue('4')">4</button>
            <button class="btn btn-number" onclick="appendValue('5')">5</button>
            <button class="btn btn-number" onclick="appendValue('6')">6</button>
            <button class="btn btn-operator" onclick="appendValue('-')">−</button>

            <button class="btn btn-number" onclick="appendValue('1')">1</button>
            <button class="btn btn-number" onclick="appendValue('2')">2</button>
            <button class="btn btn-number" onclick="appendValue('3')">3</button>
            <button class="btn btn-operator" onclick="appendValue('+')">+</button>

            <button class="btn btn-number" onclick="appendValue('0')">0</button>
            <button class="btn btn-number" onclick="appendValue('.')">.</button>
            <button class="btn btn-equals" onclick="calculate()">=</button>
        </div>
        <div class="history" id="history">
            <div class="history-title">计算历史</div>
        </div>
    </div>

    <script>
        let currentValue = '0';
        let previousValue = '';
        let operator = '';
        let shouldResetDisplay = false;

        const display = document.getElementById('display');
        const result = document.getElementById('result');
        const history = document.getElementById('history');

        function updateDisplay() {
            display.textContent = currentValue.length > 12
                ? parseFloat(currentValue).toExponential(6)
                : currentValue;
        }

        function appendValue(value) {
            if (shouldResetDisplay && !isNaN(value)) {
                currentValue = '';
                shouldResetDisplay = false;
            }

            if (value === '.' && currentValue.includes('.')) return;

            if (currentValue === '0' && value !== '.') {
                currentValue = value;
            } else {
                currentValue += value;
            }

            updateDisplay();
        }

        function setOperator(op) {
            if (operator && !shouldResetDisplay) {
                calculate();
            }
            previousValue = currentValue;
            operator = op;
            shouldResetDisplay = true;
            result.textContent = `${previousValue} ${operator}`;
        }

        function calculate() {
            if (!operator || shouldResetDisplay) return;

            const prev = parseFloat(previousValue);
            const curr = parseFloat(currentValue);
            let res;

            switch (operator) {
                case '+': res = prev + curr; break;
                case '-': res = prev - curr; break;
                case '*': res = prev * curr; break;
                case '/': res = curr !== 0 ? prev / curr : 'Error'; break;
                case '%': res = prev % curr; break;
            }

            const expression = `${previousValue} ${operator} ${currentValue} = ${res}`;
            addToHistory(expression);

            currentValue = res.toString();
            operator = '';
            result.textContent = '';
            updateDisplay();
            shouldResetDisplay = true;
        }

        function clearAll() {
            currentValue = '0';
            previousValue = '';
            operator = '';
            result.textContent = '';
            updateDisplay();
        }

        function backspace() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        function addToHistory(expr) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = expr;
            history.appendChild(item);
            history.scrollTop = history.scrollHeight;

            const items = history.querySelectorAll('.history-item');
            if (items.length > 20) {
                items[0].remove();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendValue(e.key);
            else if (e.key === '.') appendValue('.');
            else if (e.key === '+') setOperator('+');
            else if (e.key === '-') setOperator('-');
            else if (e.key === '*') setOperator('*');
            else if (e.key === '/') setOperator('/');
            else if (e.key === '%') setOperator('%');
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape') clearAll();
            else if (e.key === 'Backspace') backspace();
        });
    </script>
</body>
</html>
